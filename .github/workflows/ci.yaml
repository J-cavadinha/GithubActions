name: Validacao output

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  testes:
    runs-on: ubunto-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Python 3.10 config
      uses: actions/setup-python@v5
      with: python-version: "3.10"

    - name: Run automated test
      run: |
        python -m uniitest sum.py